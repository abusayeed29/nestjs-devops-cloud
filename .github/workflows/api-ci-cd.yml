# Build, test, and deploy the NestJS API to ECS Fargate via ECR

name: CI/CD — NestJS API to ECS Fargate

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/api-ci-cd.yml"

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:   ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER:      ${{ secrets.ECS_CLUSTER }}
  ECS_SERVICE:      ${{ secrets.ECS_SERVICE }}
  TASK_DEFINITION:  ${{ secrets.ECS_TASK_DEFINITION }}  # family name e.g. nestjs-devops-api
  CONTAINER_NAME:   ${{ secrets.ECS_CONTAINER_NAME }}   # e.g. nestjs-devops-api

# ─── CI ───────────────────────────────────────────────────────────────────────

jobs:
  ci:
    name: Lint, Test & Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22          # LTS — stable for CI
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./api

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: ./api

      - name: Lint
        run: npm run lint:ci
        working-directory: ./api

      - name: Run tests
        run: npm test -- --passWithNoTests
        working-directory: ./api

      - name: NPM audit (high severity)
        run: npm audit --audit-level=high || true
        working-directory: ./api

# ─── Deploy ───────────────────────────────────────────────────────────────────

  deploy:
    name: Build → ECR → ECS Deploy
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── AWS Auth via OIDC (no static credentials) ───────────────────────────
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      # ── ECR Login ────────────────────────────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & Push Docker image (tagged with git SHA) ──────────────────────
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          IMAGE_URI="${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

          docker build \
            --no-cache \
            --label "git.sha=${{ github.sha }}" \
            --label "git.ref=${{ github.ref_name }}" \
            -t "$IMAGE_URI" \
            ./api

          docker push "$IMAGE_URI"

          # Also tag as latest for convenience
          docker tag "$IMAGE_URI" "${{ env.ECR_REPOSITORY }}:latest"
          docker push "${{ env.ECR_REPOSITORY }}:latest"

          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

      # ── Run Prisma Migrations as a one-off ECS task ──────────────────────────
      - name: Run database migrations
        env:
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
        run: |
          # Get current task definition and swap image, keep all secrets/config intact
          TASK_DEF_JSON=$(aws ecs describe-task-definition \
            --task-definition "${{ env.TASK_DEFINITION }}" \
            --query 'taskDefinition' \
            --output json)

          MIGRATE_TASK=$(echo "$TASK_DEF_JSON" | jq \
            --arg IMAGE "${{ steps.build-image.outputs.image }}" \
            --arg CMD "npx prisma migrate deploy" \
            '.containerDefinitions[0].image = $IMAGE |
             .containerDefinitions[0].command = ["sh", "-c", $CMD] |
             del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                 .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')

          # Register temporary migration task definition
          MIGRATE_TASK_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$MIGRATE_TASK" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "Running Prisma migrations with task: $MIGRATE_TASK_ARN"

          # Run migration task and wait for completion
          TASK_ARN=$(aws ecs run-task \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --task-definition "$MIGRATE_TASK_ARN" \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[${{ secrets.ECS_PRIVATE_SUBNETS }}],securityGroups=[${{ secrets.ECS_SECURITY_GROUP }}],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          echo "Migration task ARN: $TASK_ARN"

          aws ecs wait tasks-stopped \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration failed with exit code $EXIT_CODE"
            exit 1
          fi

          echo "Migrations completed successfully"

      # ── Update ECS Service with new image ────────────────────────────────────
      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-arn: ${{ env.TASK_DEFINITION }}
          container-name:       ${{ env.CONTAINER_NAME }}
          image:                ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true  # block until all tasks are healthy
          wait-for-minutes:         10

      # ── Notify on failure ─────────────────────────────────────────────────────
      - name: Notify on deploy failure
        if: failure()
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }}"
          echo "Check CloudWatch logs: /ecs/${{ env.ECS_CLUSTER }}/api"
